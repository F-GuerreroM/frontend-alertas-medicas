<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="login-container">

  <div class="login-card">

    <div class="header">

      <div class="logo-circle">
        🏥
      </div>

      <h1>Sistema de Alertas Médicas</h1>

      <p class="subtitle">
        Hospital San Antonio
      </p>

    </div>

    <div *ngIf="!loginDisplay" class="login-section">

      <div class="security-badge">
        🔒 Acceso Seguro para Personal Autorizado
      </div>

      <p class="description">
        Inicie sesión con sus credenciales corporativas para acceder al
        monitoreo y gestión de alertas médicas en tiempo real.
      </p>

      <button
        class="btn btn-primary"
        (click)="login()"
        onclick="this.disabled=true; this.innerText='Conectando...';">

        Iniciar Sesión

      </button>

    </div>

    <div *ngIf="loginDisplay">

      <div class="user-bar">

        <div>
          <h2>Bienvenido</h2>
          <span>Sistema Activo</span>
        </div>

        <button
          class="btn btn-danger"
          (click)="logout()">

          Cerrar Sesión

        </button>

      </div>

      <app-dashboard></app-dashboard>

    </div>

    <footer class="footer">
      © 2026 Hospital San Antonio | Sistema de Alertas Médicas
    </footer>

  </div>

</div>

<router-outlet></router-outlet>
