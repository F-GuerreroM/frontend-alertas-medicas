<div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 40px; border-radius: 10px; max-width: 600px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
  
  <h1 style="color: #2c3e50;">🏥 Sistema de Alertas Médicas</h1>
  <p style="color: #7f8c8d;">Hospital San Antonio - Acceso Restringido</p>
  
  <hr style="border-top: 1px solid #bdc3c7; margin: 20px 0;">

  <div *ngIf="!loginDisplay">
    <p>Por favor, inicie sesión con sus credenciales médicas para continuar.</p>
   <button (click)="login()" 
        onclick="this.disabled=true; this.innerText='Abriendo ventana segura...';"
        style="background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background-color 0.3s;">
  Iniciar Sesión
</button>
  </div>

  <div *ngIf="loginDisplay">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="color: #27ae60; margin: 0;">¡Bienvenido, Doc!</h2>
      <button (click)="logout()" style="background-color: #e74c3c; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        Cerrar Sesión
      </button>
    </div>
    
    <app-dashboard></app-dashboard>
  </div>

</div>

<router-outlet></router-outlet>
